<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills – Nabila Alam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #f0d4d0; --olive: #3d4a2e; --cream: #f5f0e8; --gold: #c9a84c; --muted: #7a6a5a; }
    html { background: #f0d4d0; }
    body { background: #f0d4d0; color: var(--olive); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

    #starCursor { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; background: transparent; }

    nav { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(61,74,46,0.88); backdrop-filter: blur(10px); padding: 12px 24px; border-radius: 40px; z-index: 100; }
    nav a { color: #f5f0e8; text-decoration: none; font-size: 18px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s, color 0.2s; }
    nav a:hover { transform: scale(1.25); color: var(--gold); }
    nav a.active { color: var(--gold); }
    nav span { color: rgba(245,240,232,0.2); display: flex; align-items: center; font-size: 12px; }

    .page-header { text-align: center; padding: 52px 24px 8px; animation: fadeUp 0.6s ease both; }
    .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 8vw, 3rem); font-weight: 600; }
    .page-header p { font-size: 0.85rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 6px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    /* Balloon bundle using SVG foreignObject for labels */
    .balloon-scene {
      display: flex; flex-direction: column; align-items: center;
      padding: 16px 0 0;
    }

    .bundle-svg { overflow: visible; cursor: pointer; }

    .balloon-group { cursor: pointer; transition: filter 0.2s; }
    .balloon-group:hover { filter: brightness(1.08); }

    .tap-hint { text-align: center; font-size: 0.82rem; color: var(--muted); letter-spacing: 0.08em; padding: 12px 0 120px; }

    /* Burst */
    .particle { position: fixed; width: 8px; height: 8px; border-radius: 50%; pointer-events: none; animation: burst 0.6s ease-out forwards; z-index: 300; }
    @keyframes burst { 0% { transform:translate(0,0) scale(1); opacity:1; } 100% { transform:translate(var(--dx),var(--dy)) scale(0); opacity:0; } }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(61,74,46,0.45); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--cream); border-radius: 24px 24px 0 0; width: 100%; max-width: 520px; max-height: 80vh; overflow-y: auto; padding: 28px 24px 130px; transform: translateY(100%); transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1); }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .modal-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .modal-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 600; }
    .modal-header p { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .modal-divider { height: 1px; background: rgba(61,74,46,0.1); margin: 14px 0; }
    .skills-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .skills-grid.three-col { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; }
    @media (max-width: 400px) { .skills-grid.three-col { grid-template-columns: repeat(2,1fr); } }
    .skill-pill { padding: 7px 14px; border-radius: 20px; font-size: 0.8rem; color: var(--olive); border: 1px solid rgba(201,168,76,0.3); }
    .modal-close { position: absolute; top: 16px; right: 20px; width: 32px; height: 32px; border-radius: 50%; background: rgba(61,74,46,0.08); border: none; cursor: pointer; font-size: 16px; color: var(--olive); display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
<canvas id="starCursor"></canvas>
<nav>
  <a href="index.html" title="Home">🏠</a><span>|</span>
  <a href="experience.html" title="Experience">💼</a><span>|</span>
  <a href="education.html" title="Education">🎓</a><span>|</span>
  <a href="skills.html" class="active" title="Skills">✨</a>
</nav>

<div class="page-header">
  <h1>Skills</h1>
  <p>Pop a balloon to explore</p>
</div>

<div class="balloon-scene">
  <!-- Single SVG with balloons + strings + bow all connected -->
  <svg class="bundle-svg" viewBox="0 0 320 420" width="320" height="420">


    <!-- BOW at convergence point -->
    <!-- Left loop -->
    <ellipse cx="138" cy="345" rx="22" ry="12" fill="#111" transform="rotate(-30 138 345)"/>
    <ellipse cx="138" cy="345" rx="16" ry="8"  fill="#333" transform="rotate(-30 138 345)"/>
    <!-- Right loop -->
    <ellipse cx="182" cy="345" rx="22" ry="12" fill="#111" transform="rotate(30 182 345)"/>
    <ellipse cx="182" cy="345" rx="16" ry="8"  fill="#333" transform="rotate(30 182 345)"/>
    <!-- Center knot -->
    <ellipse cx="160" cy="342" rx="10" ry="8" fill="#111"/>
    <!-- Tail left -->
    <line x1="148" y1="350" x2="136" y2="368" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Tail right -->
    <line x1="172" y1="350" x2="184" y2="368" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>

    <!-- BALLOON 1 - Technical Skills (left outer) -->
    <g class="balloon-group" transform="rotate(-18 44 80)" data-index="0">
      <ellipse cx="44" cy="80" rx="38" ry="46" fill="#F9E290"/>
      <ellipse cx="44" cy="80" rx="38" ry="46" fill="url(#shine1)"/>
      <!-- knot -->
      <ellipse cx="44" cy="127" rx="5" ry="4" fill="#e8c84a"/>
      <text x="44" y="70" text-anchor="middle" font-size="18">🔧</text>
      <text x="44" y="84" text-anchor="middle" font-size="7" font-weight="600" fill="#4a3000" font-family="DM Sans, sans-serif">TECHNICAL</text>
      <text x="44" y="94" text-anchor="middle" font-size="7" font-weight="600" fill="#4a3000" font-family="DM Sans, sans-serif">SKILLS</text>
    </g>

    <!-- BALLOON 2 - Soft Skills -->
    <g class="balloon-group" transform="rotate(-7 95 58)" data-index="1">
      <ellipse cx="95" cy="58" rx="40" ry="48" fill="#f5d96a"/>
      <ellipse cx="95" cy="58" rx="40" ry="48" fill="url(#shine2)"/>
      <ellipse cx="95" cy="107" rx="5" ry="4" fill="#e0c450"/>
      <text x="95" y="47" text-anchor="middle" font-size="18">💬</text>
      <text x="95" y="62" text-anchor="middle" font-size="7" font-weight="600" fill="#4a3000" font-family="DM Sans, sans-serif">SOFT</text>
      <text x="95" y="72" text-anchor="middle" font-size="7" font-weight="600" fill="#4a3000" font-family="DM Sans, sans-serif">SKILLS</text>
    </g>

    <!-- BALLOON 3 - Finance & Business (center, tallest) -->
    <g class="balloon-group" data-index="2">
      <ellipse cx="160" cy="50" rx="44" ry="52" fill="#f7e4a0"/>
      <ellipse cx="160" cy="50" rx="44" ry="52" fill="url(#shine3)"/>
      <ellipse cx="160" cy="103" rx="6" ry="4" fill="#e8d080"/>
      <text x="160" y="38" text-anchor="middle" font-size="20">💰</text>
      <text x="160" y="56" text-anchor="middle" font-size="7" font-weight="600" fill="#4a3000" font-family="DM Sans, sans-serif">FINANCE &amp;</text>
      <text x="160" y="67" text-anchor="middle" font-size="7" font-weight="600" fill="#4a3000" font-family="DM Sans, sans-serif">BUSINESS</text>
    </g>

    <!-- BALLOON 4 - Marketing & Operations -->
    <g class="balloon-group" transform="rotate(7 225 58)" data-index="3">
      <ellipse cx="225" cy="58" rx="40" ry="48" fill="#e8c84a"/>
      <ellipse cx="225" cy="58" rx="40" ry="48" fill="url(#shine4)"/>
      <ellipse cx="225" cy="107" rx="5" ry="4" fill="#d4b430"/>
      <text x="225" y="47" text-anchor="middle" font-size="18">📣</text>
      <text x="225" y="62" text-anchor="middle" font-size="7" font-weight="600" fill="#4a3000" font-family="DM Sans, sans-serif">MARKETING</text>
      <text x="225" y="72" text-anchor="middle" font-size="7" font-weight="600" fill="#4a3000" font-family="DM Sans, sans-serif">&amp; OPS</text>
    </g>

    <!-- BALLOON 5 - Curious by Nature (right outer) -->
    <g class="balloon-group" transform="rotate(18 276 80)" data-index="4">
      <ellipse cx="276" cy="80" rx="38" ry="46" fill="#f2db78"/>
      <ellipse cx="276" cy="80" rx="38" ry="46" fill="url(#shine5)"/>
      <ellipse cx="276" cy="127" rx="5" ry="4" fill="#dcc860"/>
      <text x="276" y="70" text-anchor="middle" font-size="18">🌍</text>
      <text x="276" y="84" text-anchor="middle" font-size="7" font-weight="600" fill="#4a3000" font-family="DM Sans, sans-serif">CURIOUS</text>
      <text x="276" y="94" text-anchor="middle" font-size="7" font-weight="600" fill="#4a3000" font-family="DM Sans, sans-serif">BY NATURE</text>
    </g>

    <!-- Shine gradients -->
    <defs>
      <radialGradient id="shine1" cx="35%" cy="30%"><stop offset="0%" stop-color="white" stop-opacity="0.35"/><stop offset="100%" stop-color="white" stop-opacity="0"/></radialGradient>
      <radialGradient id="shine2" cx="35%" cy="30%"><stop offset="0%" stop-color="white" stop-opacity="0.35"/><stop offset="100%" stop-color="white" stop-opacity="0"/></radialGradient>
      <radialGradient id="shine3" cx="35%" cy="30%"><stop offset="0%" stop-color="white" stop-opacity="0.35"/><stop offset="100%" stop-color="white" stop-opacity="0"/></radialGradient>
      <radialGradient id="shine4" cx="35%" cy="30%"><stop offset="0%" stop-color="white" stop-opacity="0.35"/><stop offset="100%" stop-color="white" stop-opacity="0"/></radialGradient>
      <radialGradient id="shine5" cx="35%" cy="30%"><stop offset="0%" stop-color="white" stop-opacity="0.35"/><stop offset="100%" stop-color="white" stop-opacity="0"/></radialGradient>
    </defs>

    <!-- CURVED STRINGS drawn AFTER balloons - exact rotated knot positions -->
    <path d="M59.8,128.5 C70,190 100,270 160,342"   fill="none" stroke="#111" stroke-width="2"/>
    <path d="M101.5,110.6 C100,175 115,255 160,342"  fill="none" stroke="#111" stroke-width="2"/>
    <path d="M160,107 C157,175 159,255 160,342"      fill="none" stroke="#111" stroke-width="2"/>
    <path d="M218.5,110.6 C220,175 205,255 160,342"  fill="none" stroke="#111" stroke-width="2"/>
    <path d="M260.2,128.5 C250,190 220,270 160,342"  fill="none" stroke="#111" stroke-width="2"/>

    <!-- BOW -->
    <ellipse cx="138" cy="345" rx="22" ry="12" fill="#111" transform="rotate(-30 138 345)"/>
    <ellipse cx="138" cy="345" rx="16" ry="8"  fill="#333" transform="rotate(-30 138 345)"/>
    <ellipse cx="182" cy="345" rx="22" ry="12" fill="#111" transform="rotate(30 182 345)"/>
    <ellipse cx="182" cy="345" rx="16" ry="8"  fill="#333" transform="rotate(30 182 345)"/>
    <ellipse cx="160" cy="342" rx="10" ry="8" fill="#111"/>
    <line x1="148" y1="350" x2="136" y2="368" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="172" y1="350" x2="184" y2="368" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
</div>

<p class="tap-hint">tap any balloon to see skills</p>

<!-- Modal -->
<div class="modal-overlay" id="overlay">
  <div class="modal">
    <button class="modal-close" id="closeBtn">✕</button>
    <div class="modal-header">
      <div class="modal-icon" id="modalIcon"></div>
      <div><h2 id="modalTitle"></h2><p id="modalSub"></p></div>
    </div>
    <div class="modal-divider"></div>
    <div class="skills-grid" id="modalSkills"></div>
  </div>
</div>

<script>
  const categories = [
    { title:'Technical Skills', sub:'7 tools & platforms', icon:'🔧', pillBg:'rgba(249,226,144,0.3)',
      skills:['MS Office (Excel, PowerPoint, Word)','Google Workspace','Power BI','SAP','Oracle ERP','CRM Systems','Applied AI Tools'] },
    { title:'Soft Skills', sub:'9 interpersonal strengths', icon:'💬', pillBg:'rgba(245,217,106,0.3)',
      skills:['Analytical Thinking & Problem-Solving','Cross-Cultural Communication','Client Relationship Management','Attention to Detail','Stakeholder Collaboration','Organisation & Time Management','Adaptability & Continuous Learning','Independent Work Style','Quick Grasp of Complex Concepts'] },
    { title:'Finance & Business', sub:'9 functional competencies', icon:'💰', pillBg:'rgba(247,228,160,0.3)',
      skills:['Financial Accounting & Bookkeeping','Financial & Purchase Controlling','Accounts Payable & Receivable Management','Budgeting & Variance Analysis','B2B Sales & Business Development','Inventory Management','Stakeholder & Vendor Management','Database & Master Data Maintenance','Office Administration & Document Control'] },
    { title:'Marketing & Operations', sub:'9 functional competencies', icon:'📣', pillBg:'rgba(232,200,74,0.3)',
      skills:['Market Research & Consumer Behaviour Analysis','Marketing Campaign Conceptualisation','KPI Visualisation','Process Optimisation','Global Digitalisation Solutions','Project & Task Coordination','Cross-Functional Coordination','Web Design Basics','Stakeholder & Vendor Management'] },
    { title:'Curious by Nature', sub:'25 interests & passions', icon:'🌍', pillBg:'rgba(242,219,120,0.3)',
      skills:['Travelling','Experiencing Life','Photography','Skydiving','Geopolitics','Designing Clothes','Philosophy','Cooking','Meeting New People','Styling','Mathematics','Art & Exhibitions','Astronomy','Fashion & Trends','Physics','Storytelling','Learning New Things','Linguistics & Literature','Conscious Living','Digital Creativity','Movies & Film','Cultural Exploration','Shopping & Interior Curation','Listening to Music','Finding Flow in Repetition'] }
  ];

  // Attach click events to balloon groups
  document.querySelectorAll('.balloon-group').forEach(g => {
    g.addEventListener('click', () => {
      const idx = parseInt(g.dataset.index);
      burst(g, categories[idx]);
    });
  });

  function burst(el, cat) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    const colours = ['#F9E290','#c9a84c','#f5f0e8','#3d4a2e'];
    for (let p = 0; p < 14; p++) {
      const part = document.createElement('div');
      part.className = 'particle';
      part.style.background = colours[p % colours.length];
      const angle = (p/14) * Math.PI * 2;
      const dist = 50 + Math.random()*40;
      part.style.setProperty('--dx', Math.cos(angle)*dist+'px');
      part.style.setProperty('--dy', Math.sin(angle)*dist+'px');
      part.style.left = cx+'px'; part.style.top = cy+'px';
      document.body.appendChild(part);
      setTimeout(() => part.remove(), 700);
    }
    openModal(cat);
  }

  function openModal(cat) {
    const iconEl = document.getElementById('modalIcon');
    iconEl.textContent = cat.icon; iconEl.style.background = cat.pillBg;
    document.getElementById('modalTitle').textContent = cat.title;
    document.getElementById('modalSub').textContent = cat.sub;
    const grid = document.getElementById('modalSkills');
    grid.innerHTML = '';
    grid.className = cat.title === 'Curious by Nature' ? 'skills-grid three-col' : 'skills-grid';
    cat.skills.forEach((s,i) => {
      const pill = document.createElement('span');
      pill.className = 'skill-pill'; pill.textContent = s;
      pill.style.background = cat.pillBg;
      grid.appendChild(pill);
    });
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() { document.getElementById('overlay').classList.remove('open'); document.body.style.overflow = ''; }
  document.getElementById('closeBtn').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) closeModal(); });

  // Star cursor
  if (window.matchMedia("(pointer: fine)").matches) {
    const canvas = document.getElementById("starCursor");
    const ctx = canvas.getContext("2d");
    let CW, CH;
    function resize() { CW = canvas.width = window.innerWidth; CH = canvas.height = window.innerHeight; }
    resize(); window.addEventListener("resize", resize);
    document.body.style.cursor = "none";
    let mx=-200,my=-200,moving=false,moveTimer;const trail=[];
    document.addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY;moving=true;trail.push({x:mx,y:my});if(trail.length>24)trail.shift();clearTimeout(moveTimer);moveTimer=setTimeout(()=>{moving=false;},80);});
    function drawStar(x,y,r,alpha){ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle="#FFD700";ctx.shadowColor="#FFD700";ctx.shadowBlur=10;ctx.beginPath();for(let i=0;i<5;i++){const oa=(i*4*Math.PI)/5-Math.PI/2,ia=oa+Math.PI/5;if(i===0)ctx.moveTo(x+r*Math.cos(oa),y+r*Math.sin(oa));else ctx.lineTo(x+r*Math.cos(oa),y+r*Math.sin(oa));ctx.lineTo(x+r*0.4*Math.cos(ia),y+r*0.4*Math.sin(ia));}ctx.closePath();ctx.fill();ctx.restore();}
    function drawSparkle(x,y,r,alpha){ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle="#FFD700";ctx.shadowColor="#FFD700";ctx.shadowBlur=14;ctx.lineWidth=1.5;for(let i=0;i<4;i++){const a=(i*Math.PI)/4;ctx.beginPath();ctx.moveTo(x+Math.cos(a)*r*0.3,y+Math.sin(a)*r*0.3);ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);ctx.stroke();}ctx.restore();}
    let sr=6,sd=1;
    function render(){ctx.clearRect(0,0,CW,CH);if(moving&&trail.length>1){for(let i=1;i<trail.length;i++){const t=i/trail.length,p=trail[i],pp=trail[i-1];ctx.save();ctx.strokeStyle="#FFD700";ctx.shadowColor="#FFD700";ctx.shadowBlur=10;ctx.globalAlpha=t*0.65;ctx.lineWidth=t*3.5;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(pp.x,pp.y);ctx.lineTo(p.x,p.y);ctx.stroke();ctx.restore();if(i%5===0)drawStar(p.x+(Math.random()-0.5)*8,p.y+(Math.random()-0.5)*8,t*3+1,t*0.5);}}if(!moving){sr+=sd*0.07;if(sr>9||sr<5)sd*=-1;drawStar(mx,my,sr,1);drawSparkle(mx,my,sr+7,0.55);}else drawStar(mx,my,5,1);requestAnimationFrame(render);}
    render();
  }

  // Swipe
  (function(){const prev='education.html',next='index.html';let sx=0,sy=0;document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){if(dx<0)window.location.href=next;else window.location.href=prev;}},{passive:true});document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')window.location.href=next;if(e.key==='ArrowLeft')window.location.href=prev;});})();
</script>
</body>
</html>
