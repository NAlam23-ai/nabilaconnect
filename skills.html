<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills – Nabila Alam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #e8c4b8;
      --olive: #3a4a20;
      --cream: #f5f0e8;
      --gold:  #c9a84c;
      --muted: #6a7a40;
    }

    html { background: #e8c4b8; }
    body {
      background: #e8c4b8;
      color: var(--olive);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

    #cursor {
      position: fixed; width: 10px; height: 10px;
      background: var(--olive); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
    }

    /* Nav */
    nav {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 20px;
      background: rgba(42,58,20,0.88); backdrop-filter: blur(10px);
      padding: 12px 24px; border-radius: 40px; z-index: 100;
    }
    nav a {
      color: var(--cream); text-decoration: none; font-size: 18px;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s, color 0.2s;
    }
    nav a:hover { transform: scale(1.25); color: var(--gold); }
    nav a.active { color: var(--gold); }
    nav span { color: rgba(245,240,232,0.2); display: flex; align-items: center; font-size: 12px; }

    /* Header */
    .page-header {
      position: relative; z-index: 1;
      text-align: center; padding: 52px 24px 8px;
      animation: fadeUp 0.6s ease both;
    }
    .page-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 7vw, 2.4rem); font-weight: 600;
    }
    .page-header p { font-size: 0.82rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 6px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Arena */
    #arena {
      position: relative; z-index: 1;
      width: 100%; height: 340px; overflow: hidden;
    }

    /* Balloon */
    .balloon-wrap {
      position: absolute;
      display: flex; flex-direction: column; align-items: center; gap: 0;
      cursor: pointer; opacity: 0;
      transition: opacity 0.5s;
    }

    .balloon {
      width: 80px; height: 95px;
      border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      box-shadow: inset -8px -8px 16px rgba(0,0,0,0.15), 0 6px 20px rgba(0,0,0,0.15);
      transition: transform 0.2s;
      animation: sway 3s var(--sway-delay) ease-in-out infinite;
      position: relative;
    }
    .balloon:hover { transform: scale(1.08); }

    @keyframes sway {
      0%,100% { transform: rotate(-4deg) translateY(0); }
      50%      { transform: rotate(4deg) translateY(-6px); }
    }

    /* Balloon shine */
    .balloon::before {
      content: '';
      position: absolute;
      top: 12px; left: 16px;
      width: 18px; height: 24px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      transform: rotate(-30deg);
    }

    /* Balloon knot */
    .balloon::after {
      content: '';
      position: absolute;
      bottom: -6px; left: 50%;
      transform: translateX(-50%);
      width: 10px; height: 10px;
      background: inherit;
      clip-path: polygon(50% 100%, 0% 0%, 100% 0%);
      filter: brightness(0.85);
    }

    .balloon-icon { font-size: 22px; position: relative; z-index: 1; }
    .balloon-label {
      font-size: 8px; font-weight: 500; letter-spacing: 0.06em;
      text-transform: uppercase; color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
      text-align: center; line-height: 1.3;
      max-width: 64px; position: relative; z-index: 1;
    }

    /* String */
    .balloon-string {
      width: 1px; height: 28px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.05));
    }

    /* Burst particles */
    .particle {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      pointer-events: none;
      animation: burst 0.6s ease-out forwards;
    }
    @keyframes burst {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    /* Tap hint */
    .tap-hint {
      position: relative; z-index: 1;
      text-align: center; font-size: 0.75rem; color: var(--muted);
      letter-spacing: 0.08em; padding-bottom: 8px;
      animation: fadeUp 0.6s 0.8s ease both;
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(42,58,20,0.5); backdrop-filter: blur(4px);
      z-index: 200; display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--cream); border-radius: 24px 24px 0 0;
      width: 100%; max-width: 520px; max-height: 80vh; overflow-y: auto;
      padding: 28px 24px 130px;
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .modal-icon {
      width: 48px; height: 48px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .modal-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; font-weight: 600;
    }
    .modal-header p { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    .modal-divider { height: 1px; background: rgba(58,74,32,0.1); margin: 14px 0; }

    .skills-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .skill-pill {
      padding: 7px 14px; border-radius: 20px;
      font-size: 0.78rem; color: var(--olive);
      border: 1px solid rgba(201,168,76,0.3);
      animation: fadeUp 0.3s ease both;
    }

    .modal-close {
      position: absolute; top: 16px; right: 20px;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(58,74,32,0.08); border: none;
      cursor: pointer; font-size: 16px; color: var(--olive);
      display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

<div id="cursor"></div>

<nav>
  <a href="index.html" title="Home">🏠</a>
  <span>|</span>
  <a href="experience.html" title="Experience">💼</a>
  <span>|</span>
  <a href="education.html" title="Education">🎓</a>
  <span>|</span>
  <a href="skills.html" class="active" title="Skills">✨</a>
</nav>

<div class="page-header">
  <h1>Skills</h1>
  <p>Pop a balloon to explore</p>
</div>

<div id="arena"></div>
<p class="tap-hint">tap any balloon to see skills</p>

<!-- Modal -->
<div class="modal-overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="closeBtn">✕</button>
    <div class="modal-header">
      <div class="modal-icon" id="modalIcon"></div>
      <div>
        <h2 id="modalTitle"></h2>
        <p id="modalSub"></p>
      </div>
    </div>
    <div class="modal-divider"></div>
    <div class="skills-grid" id="modalSkills"></div>
  </div>
</div>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
  });

  // Categories
  const categories = [
    {
      title: 'Technical Skills',
      sub: '7 tools & platforms',
      icon: '🔧',
      color: '#7b9e87',
      pillBg: 'rgba(123,158,135,0.2)',
      skills: [
        'MS Office (Excel, PowerPoint, Word)',
        'Google Workspace',
        'Power BI',
        'SAP',
        'Oracle ERP',
        'CRM Systems',
        'Applied AI Tools'
      ]
    },
    {
      title: 'Soft Skills',
      sub: '9 interpersonal strengths',
      icon: '💬',
      color: '#c9a84c',
      pillBg: 'rgba(201,168,76,0.2)',
      skills: [
        'Analytical Thinking & Problem-Solving',
        'Cross-Cultural Communication',
        'Client Relationship Management',
        'Attention to Detail',
        'Stakeholder Collaboration',
        'Organisation & Time Management',
        'Adaptability & Continuous Learning',
        'Independent Work Style',
        'Quick Grasp of Complex Concepts'
      ]
    },
    {
      title: 'Finance & Business',
      sub: '9 functional competencies',
      icon: '💰',
      color: '#6b8cae',
      pillBg: 'rgba(107,140,174,0.2)',
      skills: [
        'Financial Accounting & Bookkeeping',
        'Financial & Purchase Controlling',
        'Accounts Payable & Receivable Management',
        'Budgeting & Variance Analysis',
        'B2B Sales & Business Development',
        'Inventory Management',
        'Stakeholder & Vendor Management',
        'Database & Master Data Maintenance',
        'Office Administration & Document Control'
      ]
    },
    {
      title: 'Marketing & Operations',
      sub: '9 functional competencies',
      icon: '📣',
      color: '#b87a5a',
      pillBg: 'rgba(184,122,90,0.2)',
      skills: [
        'Market Research & Consumer Behaviour Analysis',
        'Marketing Campaign Conceptualisation',
        'KPI Visualisation',
        'Process Optimisation',
        'Global Digitalisation Solutions',
        'Project & Task Coordination',
        'Cross-Functional Coordination',
        'Web Design Basics',
        'Stakeholder & Vendor Management'
      ]
    }
  ];

  const arena = document.getElementById('arena');
  const SZ = 90, PAD = 12;
  const W = () => arena.clientWidth;
  const H = () => arena.clientHeight;

  const positions = [
    { x: 0.07, y: 0.05 },
    { x: 0.55, y: 0.03 },
    { x: 0.10, y: 0.50 },
    { x: 0.58, y: 0.48 }
  ];

  const state = [];
  const wraps = [];
  const balloonEls = [];
  const burstTimeouts = [];

  categories.forEach((cat, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'balloon-wrap';
    wrap.style.setProperty('--sway-delay', `${i * 0.6}s`);

    const balloon = document.createElement('div');
    balloon.className = 'balloon';
    balloon.style.background = cat.color;
    balloon.style.setProperty('--sway-delay', `${i * 0.6}s`);

    const icon = document.createElement('div');
    icon.className = 'balloon-icon';
    icon.textContent = cat.icon;

    const label = document.createElement('div');
    label.className = 'balloon-label';
    label.textContent = cat.title;

    balloon.appendChild(icon);
    balloon.appendChild(label);

    const string = document.createElement('div');
    string.className = 'balloon-string';

    wrap.appendChild(balloon);
    wrap.appendChild(string);

    wrap.addEventListener('click', () => burstAndOpen(i, cat, wrap, balloon));
    arena.appendChild(wrap);
    wraps.push(wrap);
    balloonEls.push(balloon);

    // Fly in
    setTimeout(() => { wrap.style.opacity = '1'; }, 200 + i * 150);

    const x = positions[i].x * W();
    const y = positions[i].y * H();
    const angle = Math.random() * Math.PI * 2;
    state.push({ x, y, vx: Math.cos(angle)*0.5, vy: Math.sin(angle)*0.4 });
    wrap.style.left = x + 'px';
    wrap.style.top  = y + 'px';
  });

  // Float
  function float() {
    state.forEach((s, i) => {
      if (wraps[i].dataset.burst === '1') return;
      s.x += s.vx; s.y += s.vy;
      if (s.x < PAD)         { s.x = PAD;         s.vx =  Math.abs(s.vx); }
      if (s.x > W()-SZ-PAD)  { s.x = W()-SZ-PAD;  s.vx = -Math.abs(s.vx); }
      if (s.y < PAD)         { s.y = PAD;         s.vy =  Math.abs(s.vy); }
      if (s.y > H()-SZ-PAD)  { s.y = H()-SZ-PAD;  s.vy = -Math.abs(s.vy); }
      wraps[i].style.left = s.x + 'px';
      wraps[i].style.top  = s.y + 'px';
    });
    requestAnimationFrame(float);
  }
  float();

  // Burst
  function burstAndOpen(i, cat, wrap, balloon) {
    if (wrap.dataset.burst === '1') return;
    wrap.dataset.burst = '1';

    // Particles
    const colours = [cat.color, '#c9a84c', '#f5f0e8', '#3a4a20'];
    for (let p = 0; p < 14; p++) {
      const part = document.createElement('div');
      part.className = 'particle';
      part.style.background = colours[p % colours.length];
      const angle = (p / 14) * Math.PI * 2;
      const dist = 50 + Math.random() * 40;
      part.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
      part.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
      part.style.left = (state[i].x + 35) + 'px';
      part.style.top  = (state[i].y + 45) + 'px';
      arena.appendChild(part);
      setTimeout(() => part.remove(), 700);
    }

    // Hide balloon
    balloon.style.transition = 'transform 0.15s, opacity 0.15s';
    balloon.style.transform = 'scale(1.3)';
    balloon.style.opacity = '0';
    wrap.querySelector('.balloon-string').style.opacity = '0';

    // Open modal
    setTimeout(() => openModal(cat), 200);

    // Regenerate after 4s
    burstTimeouts[i] = setTimeout(() => {
      balloon.style.transform = 'scale(1)';
      balloon.style.opacity = '1';
      wrap.querySelector('.balloon-string').style.opacity = '1';
      wrap.dataset.burst = '0';
    }, 4000);
  }

  // Modal
  function openModal(cat) {
    const iconEl = document.getElementById('modalIcon');
    iconEl.textContent = cat.icon;
    iconEl.style.background = cat.pillBg;

    document.getElementById('modalTitle').textContent = cat.title;
    document.getElementById('modalSub').textContent = cat.sub;

    const grid = document.getElementById('modalSkills');
    grid.innerHTML = '';
    cat.skills.forEach((s, i) => {
      const pill = document.createElement('span');
      pill.className = 'skill-pill';
      pill.textContent = s;
      pill.style.background = cat.pillBg;
      pill.style.animationDelay = `${i * 0.05}s`;
      grid.appendChild(pill);
    });

    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('closeBtn').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });
</script>
</body>
</html>
