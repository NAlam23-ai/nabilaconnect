<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experience – Nabila Alam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sage:   #d4956a;
      --olive:  #3d4a2e;
      --cream:  #f5f0e8;
      --gold:   #c9a84c;
      --muted:  #6b7a57;
    }

    html { background: #d4956a; }

    body {
      background: #d4956a;
      color: var(--olive);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

        #starCursor {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
      background: transparent;
    }

    /* Nav dock */
    nav {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      background: rgba(61,74,46,0.88);
      backdrop-filter: blur(10px);
      padding: 12px 24px;
      border-radius: 40px;
      z-index: 100;
    }
    nav a {
      color: var(--cream);
      text-decoration: none;
      font-size: 18px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s, color 0.2s;
    }
    nav a:hover { transform: scale(1.25); color: var(--gold); }
    nav a.active { color: var(--gold); }
    nav span.nav-sep { color: var(--cream); opacity: 0.2; display: flex; align-items: center; font-size: 12px; }

    /* Page header */
    .page-header {
      text-align: center;
      padding: 56px 24px 16px;
      animation: fadeUp 0.7s ease both;
    }
    .page-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 8vw, 3rem);
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .page-header p {
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Bubble arena */
    #arena {
      position: relative;
      width: 100%;
      height: calc(100vh - 220px);
      min-height: 420px;
      max-height: 600px;
      overflow: hidden;
    }

    .bubble {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--cream);
      box-shadow: 0 4px 20px rgba(61,74,46,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: box-shadow 0.25s, transform 0.25s;
      border: 2px solid rgba(201,168,76,0.25);
      padding: 12px;
      gap: 6px;
      user-select: none;
    }
    .bubble:hover {
      box-shadow: 0 8px 32px rgba(61,74,46,0.25);
      transform: scale(1.06);
      border-color: var(--gold);
      z-index: 10;
    }
    .bubble img {
      width: 100px;
      height: 62px;
      object-fit: contain;
    }
    .bubble-name {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      line-height: 1.3;
    }

    /* Fallback initials */
    .bubble-initials {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: white;
    }

    /* Tap hint */
    .tap-hint {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      padding: 8px 0 100px;
      animation: fadeUp 0.7s 0.4s ease both;
      opacity: 0;
    }
    .tap-hint.visible { opacity: 1; }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(61,74,46,0.55);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--cream);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 520px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 28px 24px 120px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .modal-logo {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: white;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(61,74,46,0.1);
      padding: 8px;
    }
    .modal-logo img {
      width: 100%; height: 100%;
      object-fit: contain;
    }
    .modal-title h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.45rem;
      font-weight: 600;
      line-height: 1.2;
    }
    .modal-title .role {
      font-size: 0.92rem;
      color: var(--gold);
      font-weight: 500;
      letter-spacing: 0.04em;
      margin-top: 2px;
    }
    .modal-title .meta {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .modal-divider {
      height: 1px;
      background: rgba(61,74,46,0.1);
      margin: 16px 0;
    }

    .modal-responsibilities {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .modal-responsibilities li {
      display: flex;
      gap: 10px;
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--olive);
    }
    .modal-responsibilities li::before {
      content: '·';
      color: var(--gold);
      font-size: 1.4rem;
      line-height: 1.1;
      flex-shrink: 0;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(61,74,46,0.08);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      color: var(--olive);
    }

    @media (min-width: 480px) {
      .bubble { width: 170px; height: 170px; }
      .bubble img { width: 106px; height: 66px; }
    }
  </style>
</head>
<body>

<canvas id="starCursor"></canvas>

<nav>
  <a href="index.html" title="Home">🏠</a>
  <span class="nav-sep">|</span>
  <a href="experience.html" class="active" title="Experience">💼</a>
  <span class="nav-sep">|</span>
  <a href="education.html" title="Education">🎓</a>
  <span class="nav-sep">|</span>
  <a href="skills.html" title="Skills">✨</a>
</nav>

<div class="page-header">
  <h1>Experience</h1>
  <p>Tap a company to explore</p>
</div>

<div id="arena"></div>

<p class="tap-hint" id="hint">tap any bubble to see details</p>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-header">
      <div class="modal-logo" id="modalLogo"></div>
      <div class="modal-title">
        <h2 id="modalCompany"></h2>
        <div class="role" id="modalRole"></div>
        <div class="meta" id="modalMeta"></div>
      </div>
    </div>
    <div class="modal-divider"></div>
    <ul class="modal-responsibilities" id="modalList"></ul>
  </div>
</div>

<script>
  // Company data
  const companies = [
    {
      id: 'jokr',
      name: 'JOKR GmbH',
      role: 'Working Student – Finance & Accounting',
      meta: '2023 · Berlin, Germany',
      logo: 'logo-jokr.png',
      fallback: { initials: 'JK', bg: '#001F5B' },
      responsibilities: [
        'Supported group consolidation and financial reporting in line with IFRS/GAAP compliance.',
        'Assisted in accounts payable (AP) management, invoicing, and treasury operations for HQ and US finance functions.',
        'Contributed to corporate banking activities and invoice control, ensuring process accuracy and compliance.',
        'Conducted data analysis for management reporting and financial consolidation.'
      ]
    },
    {
      id: 'forvia',
      name: 'Forvia SE',
      role: 'Working Student – Purchase Controlling',
      meta: '2022 · Augsburg, Germany',
      logo: 'logo-forvia.png',
      fallback: { initials: 'FV', bg: '#0032A0' },
      responsibilities: [
        'Assisted in purchase controlling, budget planning, and month-end closing for the Central Controlling team.',
        'Prepared management reports, variance analysis, and financial presentations for senior stakeholders.',
        'Coordinated with regional business units to support global financial consolidation of the Commercial Vehicle Division.',
        'Monitored R&D project creation, cost validation, and process optimization for controlling efficiency.'
      ]
    },
    {
      id: 'puma',
      name: 'Puma SE',
      role: 'Working Student – Financial Controlling',
      meta: '2021 · Herzogenaurach, Germany',
      logo: 'logo-puma.png',
      fallback: { initials: 'PS', bg: '#2d2d2d' },
      responsibilities: [
        'Entered and validated financial data in Oracle ERP and planning tools, ensuring data accuracy.',
        'Supported forecasting, budgeting, and financial analysis during month-end, quarterly, and annual closing.',
        'Conducted ad-hoc analysis and variance reporting to support decision-making.',
        'Assisted in financial process automation and optimization initiatives.'
      ]
    },
    {
      id: 'tradeshi',
      name: 'Tradeshi Ltd',
      role: 'Business Development Executive – B2B Sales',
      meta: '2016–2017 · Dhaka, Bangladesh',
      logo: 'logo-tradeshi.png',
      fallback: { initials: 'TR', bg: '#00aadd' },
      responsibilities: [
        'Conducted financial and market analysis to identify new business opportunities and revenue growth.',
        'Maintained client data in CRM systems, ensuring accurate reporting for management.',
        'Prepared business plans, presentations, and sales reports for strategic initiatives.'
      ]
    },
    {
      id: 'exim',
      name: 'Exim Bank',
      role: 'Finance Intern',
      meta: '2013 · Chittagong, Bangladesh',
      logo: 'logo-exim.png',
      fallback: { initials: 'EB', bg: '#1a7a1a' },
      responsibilities: [
        'Supported the Import-Export department by updating LC accounts and reconciling interbank transactions.',
        'Assisted in financial risk assessment and reporting for banking operations.',
        'Coordinated with credit, treasury, and trade finance teams to analyze financial drivers impacting results.',
        'Reviewed compliance with regulatory standards in accounting and reporting.'
      ]
    }
  ];

  // Build bubbles
  const arena = document.getElementById('arena');
  const W = () => arena.clientWidth;
  const H = () => arena.clientHeight;
  const SIZE = 165;
  const PADDING = 16;

  // Physics state
  let bubbles = [];

  function createBubble(company, index) {
    const el = document.createElement('div');
    el.className = 'bubble';
    el.dataset.id = company.id;

    // Logo with fallback
    const img = document.createElement('img');
    img.src = company.logo;
    img.alt = company.name;
    img.onerror = function() {
      this.style.display = 'none';
      const fb = document.createElement('div');
      fb.className = 'bubble-initials';
      fb.style.background = company.fallback.bg;
      fb.textContent = company.fallback.initials;
      el.insertBefore(fb, el.firstChild);
    };
    el.appendChild(img);

    const label = document.createElement('div');
    label.className = 'bubble-name';
    label.textContent = company.name;
    el.appendChild(label);

    el.addEventListener('click', () => openModal(company));

    arena.appendChild(el);

    // Initial position — spread out
    const cols = Math.ceil(Math.sqrt(companies.length));
    const col = index % cols;
    const row = Math.floor(index / cols);
    const spacingX = (W() - SIZE) / (cols - 1 || 1);
    const spacingY = (H() - SIZE) / (Math.ceil(companies.length / cols) - 1 || 1);

    const x = PADDING + col * spacingX * 0.7 + Math.random() * 30;
    const y = PADDING + row * spacingY * 0.75 + Math.random() * 20;

    const speed = 0.4 + Math.random() * 0.5;
    const angle = Math.random() * Math.PI * 2;

    return {
      el,
      x: Math.min(Math.max(x, PADDING), W() - SIZE - PADDING),
      y: Math.min(Math.max(y, PADDING), H() - SIZE - PADDING),
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed
    };
  }

  function init() {
    arena.innerHTML = '';
    bubbles = companies.map((c, i) => createBubble(c, i));
    setTimeout(() => {
      document.getElementById('hint').classList.add('visible');
    }, 1200);
    requestAnimationFrame(animate);
  }

  function animate() {
    const w = W(), h = H();
    bubbles.forEach(b => {
      b.x += b.vx;
      b.y += b.vy;

      // Bounce off walls
      if (b.x <= PADDING)              { b.x = PADDING;           b.vx = Math.abs(b.vx); }
      if (b.x >= w - SIZE - PADDING)   { b.x = w - SIZE - PADDING; b.vx = -Math.abs(b.vx); }
      if (b.y <= PADDING)              { b.y = PADDING;           b.vy = Math.abs(b.vy); }
      if (b.y >= h - SIZE - PADDING)   { b.y = h - SIZE - PADDING; b.vy = -Math.abs(b.vy); }

      // Soft bubble-bubble repulsion
      bubbles.forEach(other => {
        if (other === b) return;
        const dx = b.x - other.x;
        const dy = b.y - other.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < SIZE + 10 && dist > 0) {
          const force = (SIZE + 10 - dist) / (SIZE + 10) * 0.3;
          b.vx += (dx / dist) * force;
          b.vy += (dy / dist) * force;
        }
      });

      // Dampen speed
      const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
      if (speed > 1.2) { b.vx *= 0.98; b.vy *= 0.98; }
      if (speed < 0.3) { b.vx *= 1.02; b.vy *= 1.02; }

      b.el.style.left = b.x + 'px';
      b.el.style.top  = b.y + 'px';
    });
    requestAnimationFrame(animate);
  }

  // Modal
  function openModal(company) {
    document.getElementById('modalCompany').textContent = company.name;
    document.getElementById('modalRole').textContent = company.role;
    document.getElementById('modalMeta').textContent = company.meta;

    const logoEl = document.getElementById('modalLogo');
    logoEl.innerHTML = '';
    const img = document.createElement('img');
    img.src = company.logo;
    img.alt = company.name;
    img.onerror = function() {
      this.style.display = 'none';
      const fb = document.createElement('div');
      fb.className = 'bubble-initials';
      fb.style.background = company.fallback.bg;
      fb.style.width = '40px'; fb.style.height = '40px';
      fb.textContent = company.fallback.initials;
      logoEl.appendChild(fb);
    };
    logoEl.appendChild(img);

    const list = document.getElementById('modalList');
    list.innerHTML = '';
    company.responsibilities.forEach(r => {
      const li = document.createElement('li');
      li.textContent = r;
      list.appendChild(li);
    });

    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  init();
  window.addEventListener('resize', () => { bubbles.forEach(b => {
    b.x = Math.min(b.x, W() - SIZE - PADDING);
    b.y = Math.min(b.y, H() - SIZE - PADDING);
  }); });


  // Shooting star cursor (desktop only)
  if (window.matchMedia("(pointer: fine)").matches) {
    const canvas = document.getElementById("starCursor");
    const ctx = canvas.getContext("2d");
    let CW, CH;
    function resize() { CW = canvas.width = window.innerWidth; CH = canvas.height = window.innerHeight; }
    resize(); window.addEventListener("resize", resize);
    document.body.style.cursor = "none";
    let mx = -200, my = -200, moving = false, moveTimer;
    const trail = [];
    document.addEventListener("mousemove", e => {
      mx = e.clientX; my = e.clientY; moving = true;
      trail.push({ x: mx, y: my });
      if (trail.length > 24) trail.shift();
      clearTimeout(moveTimer); moveTimer = setTimeout(() => { moving = false; }, 80);
    });
    function drawStar(x, y, r, alpha) {
      ctx.save(); ctx.globalAlpha = alpha; ctx.fillStyle = "#FFD700"; ctx.shadowColor = "#FFD700"; ctx.shadowBlur = 10;
      ctx.beginPath();
      for (let i = 0; i < 5; i++) { const oa=(i*4*Math.PI)/5-Math.PI/2, ia=oa+Math.PI/5; if(i===0) ctx.moveTo(x+r*Math.cos(oa),y+r*Math.sin(oa)); else ctx.lineTo(x+r*Math.cos(oa),y+r*Math.sin(oa)); ctx.lineTo(x+r*0.4*Math.cos(ia),y+r*0.4*Math.sin(ia)); }
      ctx.closePath(); ctx.fill(); ctx.restore();
    }
    function drawSparkle(x, y, r, alpha) {
      ctx.save(); ctx.globalAlpha = alpha; ctx.strokeStyle = "#FFD700"; ctx.shadowColor = "#FFD700"; ctx.shadowBlur = 14; ctx.lineWidth = 1.5;
      for (let i = 0; i < 4; i++) { const a=(i*Math.PI)/4; ctx.beginPath(); ctx.moveTo(x+Math.cos(a)*r*0.3,y+Math.sin(a)*r*0.3); ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r); ctx.stroke(); }
      ctx.restore();
    }
    let sr = 6, sd = 1;
    function render() {
      ctx.clearRect(0, 0, CW, CH);
      if (moving && trail.length > 1) {
        for (let i = 1; i < trail.length; i++) {
          const t = i/trail.length, p = trail[i], pp = trail[i-1];
          ctx.save(); ctx.strokeStyle="#FFD700"; ctx.shadowColor="#FFD700"; ctx.shadowBlur=10; ctx.globalAlpha=t*0.65; ctx.lineWidth=t*3.5; ctx.lineCap="round";
          ctx.beginPath(); ctx.moveTo(pp.x,pp.y); ctx.lineTo(p.x,p.y); ctx.stroke(); ctx.restore();
          if (i%5===0) drawStar(p.x+(Math.random()-0.5)*8,p.y+(Math.random()-0.5)*8,t*3+1,t*0.5);
        }
      }
      if (!moving) { sr+=sd*0.07; if(sr>9||sr<5) sd*=-1; drawStar(mx,my,sr,1); drawSparkle(mx,my,sr+7,0.55); }
      else drawStar(mx,my,5,1);
      requestAnimationFrame(render);
    }
    render();
  }


  // Swipe navigation
  (function() {
    const prev = 'index.html', next = 'education.html';
    let startX = 0, startY = 0;
    document.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
        if (dx < 0) window.location.href = next;
        else window.location.href = prev;
      }
    }, { passive: true });
    // Arrow keys for laptop
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') window.location.href = next;
      if (e.key === 'ArrowLeft') window.location.href = prev;
    });
  })();

</script>
</body>
</html>
