<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experience – Nabila Alam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #f0d4d0; --olive: #3d4a2e; --cream: #f5f0e8; --gold: #c9a84c; --muted: #7a6a5a; }
    html { background: #f0d4d0; }
    body { background: #f0d4d0; color: var(--olive); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

    #starCursor { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; background: transparent; }

    nav { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(61,74,46,0.88); backdrop-filter: blur(10px); padding: 12px 24px; border-radius: 40px; z-index: 100; }
    nav a { color: #f5f0e8; text-decoration: none; font-size: 18px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s, color 0.2s; }
    nav a:hover { transform: scale(1.25); color: var(--gold); }
    nav a.active { color: var(--gold); }
    nav span { color: rgba(245,240,232,0.2); display: flex; align-items: center; font-size: 12px; }

    .page-header { text-align: center; padding: 52px 24px 8px; animation: fadeUp 0.6s ease both; }
    .page-header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 8vw, 3rem); font-weight: 600; }
    .page-header p { font-size: 0.85rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 6px; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    /* Vertical stack */
    .stack {
      max-width: 420px; margin: 0 auto;
      padding: 24px 24px 120px;
      display: flex; flex-direction: column; gap: 16px;
    }

    .company-row {
      display: flex; align-items: center; gap: 16px;
      cursor: pointer;
      animation: fadeUp 0.5s ease both;
    }
    .company-row:nth-child(1) { animation-delay: 0.05s; }
    .company-row:nth-child(2) { animation-delay: 0.10s; }
    .company-row:nth-child(3) { animation-delay: 0.15s; }
    .company-row:nth-child(4) { animation-delay: 0.20s; }
    .company-row:nth-child(5) { animation-delay: 0.25s; }

    .logo-box {
      width: 90px; height: 70px; flex-shrink: 0;
      background: var(--cream); border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      padding: 10px; box-shadow: 0 2px 10px rgba(61,74,46,0.10);
      border: 1.5px solid rgba(201,168,76,0.2);
      transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
    }
    .company-row:hover .logo-box {
      box-shadow: 0 6px 20px rgba(61,74,46,0.18);
      transform: translateX(4px);
      border-color: var(--gold);
    }
    .logo-box img { width: 100%; height: 100%; object-fit: contain; }
    .logo-box .initials {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; font-weight: 600; color: var(--olive); text-align: center;
    }

    .company-info { flex: 1; }
    .company-name { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 600; color: var(--olive); }
    .company-role { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .company-year { font-size: 0.72rem; color: var(--gold); margin-top: 2px; letter-spacing: 0.05em; }

    .chevron { font-size: 14px; color: var(--gold); flex-shrink: 0; opacity: 0.7; }

    /* Divider between rows */
    .row-divider { height: 1px; background: rgba(201,168,76,0.2); margin: 0 8px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(61,74,46,0.45); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--cream); border-radius: 24px 24px 0 0; width: 100%; max-width: 520px; max-height: 80vh; overflow-y: auto; padding: 28px 24px 130px; transform: translateY(100%); transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1); }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
    .modal-logo { width: 64px; height: 50px; flex-shrink: 0; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(61,74,46,0.1); padding: 8px; overflow: hidden; }
    .modal-logo img { width: 100%; height: 100%; object-fit: contain; }
    .modal-title h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 600; line-height: 1.2; }
    .modal-title .role { font-size: 0.82rem; color: var(--gold); font-weight: 500; margin-top: 2px; }
    .modal-title .meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .modal-divider { height: 1px; background: rgba(61,74,46,0.1); margin: 16px 0; }
    .modal-responsibilities { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .modal-responsibilities li { display: flex; gap: 10px; font-size: 0.9rem; line-height: 1.55; color: var(--olive); }
    .modal-responsibilities li::before { content: '·'; color: var(--gold); font-size: 1.4rem; line-height: 1.1; flex-shrink: 0; }
    .modal-close { position: absolute; top: 16px; right: 20px; width: 32px; height: 32px; border-radius: 50%; background: rgba(61,74,46,0.08); border: none; cursor: pointer; font-size: 16px; color: var(--olive); display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
<canvas id="starCursor"></canvas>
<nav>
  <a href="index.html" title="Home">🏠</a><span>|</span>
  <a href="experience.html" class="active" title="Experience">💼</a><span>|</span>
  <a href="education.html" title="Education">🎓</a><span>|</span>
  <a href="skills.html" title="Skills">✨</a>
</nav>

<div class="page-header">
  <h1>Experience</h1>
  <p>Tap a company to explore</p>
</div>

<div class="stack" id="stack"></div>

<!-- Modal -->
<div class="modal-overlay" id="overlay">
  <div class="modal">
    <button class="modal-close" id="closeBtn">✕</button>
    <div class="modal-header">
      <div class="modal-logo" id="modalLogo"></div>
      <div class="modal-title">
        <h2 id="modalCompany"></h2>
        <div class="role" id="modalRole"></div>
        <div class="meta" id="modalMeta"></div>
      </div>
    </div>
    <div class="modal-divider"></div>
    <ul class="modal-responsibilities" id="modalList"></ul>
  </div>
</div>

<script>
  const companies = [
    { name:'JOKR GmbH', role:'Working Student – Finance & Accounting', meta:'2023 · Berlin, Germany', logo:'logo-jokr.png', fallback:'JK',
      responsibilities:['Supported group consolidation and financial reporting in line with IFRS/GAAP compliance.','Assisted in accounts payable (AP) management, invoicing, and treasury operations for HQ and US finance functions.','Contributed to corporate banking activities and invoice control, ensuring process accuracy and compliance.','Conducted data analysis for management reporting and financial consolidation.'] },
    { name:'Forvia SE', role:'Working Student – Purchase Controlling', meta:'2022 · Augsburg, Germany', logo:'logo-forvia.png', fallback:'FV',
      responsibilities:['Assisted in purchase controlling, budget planning, and month-end closing for the Central Controlling team.','Prepared management reports, variance analysis, and financial presentations for senior stakeholders.','Coordinated with regional business units to support global financial consolidation of the Commercial Vehicle Division.','Monitored R&D project creation, cost validation, and process optimization for controlling efficiency.'] },
    { name:'Puma SE', role:'Working Student – Financial Controlling', meta:'2021 · Herzogenaurach, Germany', logo:'logo-puma.png', fallback:'PS',
      responsibilities:['Entered and validated financial data in Oracle ERP and planning tools, ensuring data accuracy.','Supported forecasting, budgeting, and financial analysis during month-end, quarterly, and annual closing.','Conducted ad-hoc analysis and variance reporting to support decision-making.','Assisted in financial process automation and optimization initiatives.'] },
    { name:'Tradeshi Ltd', role:'Business Development Executive – B2B Sales', meta:'2016–2017 · Dhaka, Bangladesh', logo:'logo-tradeshi.png', fallback:'TR',
      responsibilities:['Conducted financial and market analysis to identify new business opportunities and revenue growth.','Maintained client data in CRM systems, ensuring accurate reporting for management.','Prepared business plans, presentations, and sales reports for strategic initiatives.'] },
    { name:'Exim Bank', role:'Finance Intern', meta:'2013 · Chittagong, Bangladesh', logo:'logo-exim.png', fallback:'EB',
      responsibilities:['Supported the Import-Export department by updating LC accounts and reconciling interbank transactions.','Assisted in financial risk assessment and reporting for banking operations.','Coordinated with credit, treasury, and trade finance teams to analyze financial drivers impacting results.','Reviewed compliance with regulatory standards in accounting and reporting.'] }
  ];

  const stack = document.getElementById('stack');

  companies.forEach((co, i) => {
    if (i > 0) {
      const div = document.createElement('div');
      div.className = 'row-divider';
      stack.appendChild(div);
    }
    const row = document.createElement('div');
    row.className = 'company-row';

    const logoBox = document.createElement('div');
    logoBox.className = 'logo-box';
    const img = document.createElement('img');
    img.src = co.logo; img.alt = co.name;
    img.onerror = function() {
      this.remove();
      const d = document.createElement('div');
      d.className = 'initials'; d.textContent = co.fallback;
      logoBox.appendChild(d);
    };
    logoBox.appendChild(img);

    const info = document.createElement('div');
    info.className = 'company-info';
    info.innerHTML = `<div class="company-name">${co.name}</div><div class="company-role">${co.role}</div><div class="company-year">${co.meta}</div>`;

    const chev = document.createElement('div');
    chev.className = 'chevron'; chev.textContent = '›';

    row.appendChild(logoBox); row.appendChild(info); row.appendChild(chev);
    row.addEventListener('click', () => openModal(co));
    stack.appendChild(row);
  });

  function openModal(co) {
    document.getElementById('modalCompany').textContent = co.name;
    document.getElementById('modalRole').textContent = co.role;
    document.getElementById('modalMeta').textContent = co.meta;
    const logoEl = document.getElementById('modalLogo');
    logoEl.innerHTML = '';
    const img = document.createElement('img');
    img.src = co.logo; img.alt = co.name;
    img.onerror = function() { this.remove(); const d = document.createElement('div'); d.className = 'initials'; d.textContent = co.fallback; logoEl.appendChild(d); };
    logoEl.appendChild(img);
    const list = document.getElementById('modalList');
    list.innerHTML = '';
    co.responsibilities.forEach(r => { const li = document.createElement('li'); li.textContent = r; list.appendChild(li); });
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() { document.getElementById('overlay').classList.remove('open'); document.body.style.overflow = ''; }
  document.getElementById('closeBtn').addEventListener('click', closeModal);
  document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) closeModal(); });

  // Shooting star cursor
  if (window.matchMedia("(pointer: fine)").matches) {
    const canvas = document.getElementById("starCursor");
    const ctx = canvas.getContext("2d");
    let CW, CH;
    function resize() { CW = canvas.width = window.innerWidth; CH = canvas.height = window.innerHeight; }
    resize(); window.addEventListener("resize", resize);
    document.body.style.cursor = "none";
    let mx = -200, my = -200, moving = false, moveTimer;
    const trail = [];
    document.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; moving = true; trail.push({x:mx,y:my}); if(trail.length>24) trail.shift(); clearTimeout(moveTimer); moveTimer = setTimeout(()=>{moving=false;},80); });
    function drawStar(x,y,r,alpha){ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle="#FFD700";ctx.shadowColor="#FFD700";ctx.shadowBlur=10;ctx.beginPath();for(let i=0;i<5;i++){const oa=(i*4*Math.PI)/5-Math.PI/2,ia=oa+Math.PI/5;if(i===0)ctx.moveTo(x+r*Math.cos(oa),y+r*Math.sin(oa));else ctx.lineTo(x+r*Math.cos(oa),y+r*Math.sin(oa));ctx.lineTo(x+r*0.4*Math.cos(ia),y+r*0.4*Math.sin(ia));}ctx.closePath();ctx.fill();ctx.restore();}
    function drawSparkle(x,y,r,alpha){ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle="#FFD700";ctx.shadowColor="#FFD700";ctx.shadowBlur=14;ctx.lineWidth=1.5;for(let i=0;i<4;i++){const a=(i*Math.PI)/4;ctx.beginPath();ctx.moveTo(x+Math.cos(a)*r*0.3,y+Math.sin(a)*r*0.3);ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);ctx.stroke();}ctx.restore();}
    let sr=6,sd=1;
    function render(){ctx.clearRect(0,0,CW,CH);if(moving&&trail.length>1){for(let i=1;i<trail.length;i++){const t=i/trail.length,p=trail[i],pp=trail[i-1];ctx.save();ctx.strokeStyle="#FFD700";ctx.shadowColor="#FFD700";ctx.shadowBlur=10;ctx.globalAlpha=t*0.65;ctx.lineWidth=t*3.5;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(pp.x,pp.y);ctx.lineTo(p.x,p.y);ctx.stroke();ctx.restore();if(i%5===0)drawStar(p.x+(Math.random()-0.5)*8,p.y+(Math.random()-0.5)*8,t*3+1,t*0.5);}}if(!moving){sr+=sd*0.07;if(sr>9||sr<5)sd*=-1;drawStar(mx,my,sr,1);drawSparkle(mx,my,sr+7,0.55);}else drawStar(mx,my,5,1);requestAnimationFrame(render);}
    render();
  }

  // Swipe
  (function(){const prev='index.html',next='education.html';let sx=0,sy=0;document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){if(dx<0)window.location.href=next;else window.location.href=prev;}},{passive:true});document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')window.location.href=next;if(e.key==='ArrowLeft')window.location.href=prev;});})();
</script>
</body>
</html>
